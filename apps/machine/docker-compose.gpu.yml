# This file is dynamically generated for gpu_machine
# Machine type: gpu_machine
# Generated on: 2025-07-25T22:10:15.798Z

services:
  gpu-machine:
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    image: ${MACHINE_IMAGE:-gpu_machine:latest}
    platform: linux/amd64
    container_name: ${MACHINE_CONTAINER_NAME:-gpu_machine}
    hostname: ${MACHINE_CONTAINER_NAME:-gpu_machine}
    restart: "no"  # Controlled by API instead of Docker
    
    # Fast shutdown for elastic scaling
    stop_grace_period: 2s
    stop_signal: SIGTERM
    
    # Environment from .env.gpu
    env_file:
      - .env.gpu
    
    environment:
      # Docker runtime
      - NODE_ENV=production
      # GPU access
      - NVIDIA_VISIBLE_DEVICES=all  
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    
    working_dir: /workspace
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    
    # GPU runtime (comment out for macOS/non-NVIDIA development)
    # runtime: nvidia
