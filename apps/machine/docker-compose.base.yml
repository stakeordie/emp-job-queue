# This file is dynamically generated for base_machine
# Machine type: base_machine
# Generated on: 2025-07-25T22:10:15.798Z

services:
  base-machine:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
        # Build args from environment
        AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
        AWS_SECRET_ACCESS_KEY_ENCODED: ${AWS_SECRET_ACCESS_KEY_ENCODED}
        AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
        AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT}
        AZURE_STORAGE_KEY: ${AZURE_STORAGE_KEY}
        CLOUD_STORAGE_CONTAINER: ${CLOUD_STORAGE_CONTAINER}
        CLOUD_PROVIDER: ${CLOUD_PROVIDER}
        HF_TOKEN: ${HF_TOKEN}
        CIVITAI_TOKEN: ${CIVITAI_TOKEN}
        OPENAI_API_KEY: ${OPENAI_API_KEY}
    image: ${MACHINE_IMAGE:-base_machine:latest}
    platform: linux/amd64
    container_name: ${MACHINE_CONTAINER_NAME:-base_machine}
    hostname: ${MACHINE_CONTAINER_NAME:-base_machine}
    restart: "no"  # Controlled by API instead of Docker
    
    # Fast shutdown for elastic scaling
    stop_grace_period: 2s
    stop_signal: SIGTERM
    
    # Environment from .env.base
    env_file:
      - .env.base
    
    environment:
      # Docker runtime
      - NODE_ENV=production
    
    working_dir: /workspace
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
